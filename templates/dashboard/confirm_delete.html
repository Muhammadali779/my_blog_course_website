{% extends 'base.html' %}
{% block title %}O'chirish Tasdiqlash{% endblock %}
{% block content %}
<section class="section" style="min-height:70vh; display:flex; align-items:center;">
  <div class="container">
    <div style="max-width:480px; margin:0 auto; text-align:center;">
      <div style="font-size:4rem; margin-bottom:16px;">⚠️</div>
      <h1 style="font-size:1.5rem; margin-bottom:12px;">Rostan o'chirasizmi?</h1>
      <p style="color:var(--text-secondary); margin-bottom:28px;">
        <strong>{{ obj }}</strong> — bu amalni bekor qilib bo'lmaydi.
      </p>
      <div style="display:flex; gap:12px; justify-content:center;">
        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger btn-lg">🗑 Ha, O'chirish</button>
        </form>
        <a href="javascript:history.back()" class="btn btn-secondary btn-lg">Bekor Qilish</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
